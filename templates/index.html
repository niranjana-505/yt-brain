<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Brain — AI Video Summarizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #f64f59, #f093fb);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #667eea, #f64f59);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #667eea; }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #667eea, #f64f59);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #output {
            margin-top: 28px;
            background: #f9f9ff;
            border-radius: 16px;
            padding: 24px;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #333;
            display: none;
        }

        .loader {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧠 YT Brain</h1>
        <p class="subtitle">Paste any YouTube link. Get a summary, key points & quiz instantly.</p>

        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        <button onclick="analyze()" id="btn">✨ Analyze Video</button>

        <div class="loader" id="loader">🔍 Reading the video... hang tight!</div>
        <div id="output"></div>
    </div>

    <script>
        async function analyze() {
            const url = document.getElementById("urlInput").value;
            if (!url) return alert("Paste a YouTube URL first!");

            document.getElementById("btn").disabled = true;
            document.getElementById("loader").style.display = "block";
            document.getElementById("output").style.display = "none";

            const response = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url})
            });

            const data = await response.json();
            document.getElementById("output").innerText = data.result;
            document.getElementById("output").style.display = "block";
            document.getElementById("loader").style.display = "none";
            document.getElementById("btn").disabled = false;
        }
    </script>
</body>
</html>
